<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi e-RAB Konstruksi</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-800 font-sans min-h-screen">
    <nav class="bg-slate-900 text-white p-4 shadow-lg flex justify-between items-center">
        <h1 class="text-xl font-bold">Aplikasi e-RAB Konstruksi</h1>
        <button onclick="bukaModalProyek()" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded text-sm font-semibold">+ Buat Proyek</button>
    </nav>

    <div class="max-w-6xl mx-auto p-6 space-y-6">
        <!-- Daftar Proyek / Tipe Proyek -->
        <div class="bg-white rounded-lg shadow p-6">
            <h2 class="text-lg font-bold mb-4">Daftar Tipe / Nama Proyek</h2>
            <div id="list-proyek" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Proyek dimuat secara dinamis -->
            </div>
        </div>

        <!-- Detail Proyek & 12 Item Pekerjaan -->
        <div id="detail-proyek-section" class="bg-white rounded-lg shadow p-6 hidden">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 gap-2">
                <h2 id="judul-detail-proyek" class="text-lg font-bold">Rincian Item Pekerjaan</h2>
                <div class="flex gap-2">
                    <button onclick="muat12ItemStandar()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-1.5 rounded text-xs font-semibold shadow">⚡ Muat 12 Item Pekerjaan Standar</button>
                    <button onclick="tutupDetail()" class="text-gray-500 hover:text-black text-sm font-semibold px-2">Tutup [X]</button>
                </div>
            </div>
            
            <!-- Form Tambah Item Pekerjaan Manual -->
            <form id="form-item-rab" onsubmit="tambahItemRAB(event)" class="grid grid-cols-1 md:grid-cols-6 gap-3 mb-6 bg-slate-50 p-4 rounded border">
                <input type="text" id="kategori" placeholder="Kategori (Cth: Struktur)" class="border p-2 rounded text-sm" required>
                <input type="text" id="uraian" placeholder="Uraian Pekerjaan" class="border p-2 rounded text-sm md:col-span-2" required>
                <input type="number" id="volume" placeholder="Volume" step="any" class="border p-2 rounded text-sm" required>
                <input type="text" id="satuan" placeholder="Satuan (m3, m2, unit)" class="border p-2 rounded text-sm" required>
                <input type="number" id="harga" placeholder="Harga Satuan (Rp)" step="any" class="border p-2 rounded text-sm" required>
                <button type="submit" class="bg-emerald-600 hover:bg-emerald-700 text-white p-2 rounded text-sm md:col-span-6 font-semibold">+ Tambah Item Pekerjaan</button>
            </form>

            <!-- Tabel Item RAB -->
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse text-sm">
                    <thead>
                        <tr class="bg-slate-200 border-b">
                            <th class="p-2">Kategori</th>
                            <th class="p-2">Uraian Pekerjaan</th>
                            <th class="p-2">Volume</th>
                            <th class="p-2">Satuan</th>
                            <th class="p-2">Harga Satuan</th>
                            <th class="p-2">Total Harga</th>
                            <th class="p-2 text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tabel-item-rab">
                        <!-- Item RAB dimuat secara dinamis -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal Buat Proyek -->
    <div id="modal-proyek" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden">
        <div class="bg-white p-6 rounded-lg w-full max-w-md shadow-xl">
            <h3 class="text-lg font-bold mb-4">Buat Tipe Proyek Baru</h3>
            <form onsubmit="buatProyek(event)" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Nama / Tipe Proyek</label>
                    <input type="text" id="nama_proyek" placeholder="Cth: Pembangunan Rumah Type 45" class="w-full border p-2 rounded text-sm" required>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Lokasi</label>
                    <input type="text" id="lokasi" class="w-full border p-2 rounded text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Pemilik / Instansi</label>
                    <input type="text" id="pemilik" class="w-full border p-2 rounded text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Tanggal</label>
                    <input type="date" id="tanggal" class="w-full border p-2 rounded text-sm">
                </div>
                <div class="flex justify-end space-x-2 pt-2">
                    <button type="button" onclick="tutupModalProyek()" class="px-4 py-2 border rounded text-sm">Batal</button>
                    <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded text-sm font-semibold">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentProyekId = null;

        function getProyekList() {
            return JSON.parse(localStorage.getItem('erab_proyek') || '[]');
        }

        function saveProyekList(list) {
            localStorage.setItem('erab_proyek', JSON.stringify(list));
        }

        function loadProyek() {
            const list = getProyekList();
            const container = document.getElementById('list-proyek');
            container.innerHTML = '';
            
            if (list.length === 0) {
                container.innerHTML = '<p class="text-gray-500 text-sm col-span-2">Belum ada proyek. Silakan buat proyek baru.</p>';
                return;
            }

            list.forEach(p => {
                // Hitung total RAB dari item-itemnya
                const totalRAB = (p.items || []).reduce((sum, item) => sum + item.total_harga, 0);

                container.innerHTML += `
                    <div class="border p-4 rounded-lg shadow-sm hover:border-blue-500 cursor-pointer flex justify-between items-center bg-slate-50" onclick="pilihProyek('${p.id}')">
                        <div>
                            <h3 class="font-bold text-blue-900">${p.nama_proyek}</h3>
                            <p class="text-xs text-gray-500">Lokasi: ${p.lokasi || '-'}</p>
                            <p class="text-xs text-gray-600 font-semibold mt-1">Total RAB: Rp ${Number(totalRAB).toLocaleString('id-ID')}</p>
                        </div>
                        <span class="text-xs bg-blue-100 text-blue-800 px-2 py-1 rounded font-semibold">Buka &rarr;</span>
                    </div>
                `;
            });
        }

        function bukaModalProyek() {
            document.getElementById('modal-proyek').classList.remove('hidden');
        }

        function tutupModalProyek() {
            document.getElementById('modal-proyek').classList.add('hidden');
        }

        function buatProyek(e) {
            e.preventDefault();
            const list = getProyekList();
            const newProyek = {
                id: 'p_' + Date.now(),
                nama_proyek: document.getElementById('nama_proyek').value,
                lokasi: document.getElementById('lokasi').value,
                pemilik: document.getElementById('pemilik').value,
                tanggal: document.getElementById('tanggal').value,
                items: []
            };

            list.unshift(newProyek);
            saveProyekList(list);
            tutupModalProyek();
            loadProyek();
            e.target.reset();
        }

        function pilihProyek(id) {
            const list = getProyekList();
            const p = list.find(item => item.id === id);
            if (!p) return;

            currentProyekId = id;
            document.getElementById('judul-detail-proyek').innerText = `Rincian Item Pekerjaan: ${p.nama_proyek}`;
            document.getElementById('detail-proyek-section').classList.remove('hidden');
            loadItemRAB();
        }

        function tutupDetail() {
            currentProyekId = null;
            document.getElementById('detail-proyek-section').classList.add('hidden');
        }

        function loadItemRAB() {
            const list = getProyekList();
            const p = list.find(item => item.id === currentProyekId);
            if (!p) return;

            const tbody = document.getElementById('tabel-item-rab');
            tbody.innerHTML = '';

            if (!p.items || p.items.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="p-4 text-center text-gray-500">Belum ada item pekerjaan. Klik tombol <b>"Muat 12 Item Pekerjaan Standar"</b> di atas untuk mulai cepat.</td></tr>';
                return;
            }

            p.items.forEach(item => {
                tbody.innerHTML += `
                    <tr class="border-b">
                        <td class="p-2">${item.kategori}</td>
                        <td class="p-2 font-medium">${item.uraian_pekerjaan}</td>
                        <td class="p-2">${item.volume}</td>
                        <td class="p-2">${item.satuan}</td>
                        <td class="p-2">Rp ${Number(item.harga_satuan).toLocaleString('id-ID')}</td>
                        <td class="p-2 font-semibold">Rp ${Number(item.total_harga).toLocaleString('id-ID')}</td>
                        <td class="p-2 text-center">
                            <button onclick="hapusItem('${item.id}')" class="text-red-600 hover:text-red-800 text-xs font-bold">Hapus</button>
                        </td>
                    </tr>
                `;
            });
        }

        function muat12ItemStandar() {
            if (!currentProyekId) return;
            if (!confirm('Tambahkan 12 item pekerjaan standar ke proyek ini?')) return;

            const list = getProyekList();
            const p = list.find(item => item.id === currentProyekId);
            if (!p) return;

            const items12 = [
                { kategori: 'Persiapan', uraian: 'Pembersihan Lahan & Papan Nama Proyek', volume: 1, satuan: 'Ls', harga: 500000 },
                { kategori: 'Struktur', uraian: 'Galian Tanah Pondasi', volume: 10, satuan: 'm3', harga: 75000 },
                { kategori: 'Struktur', uraian: 'Urugan Pasir Bawah Pondasi', volume: 2, satuan: 'm3', harga: 150000 },
                { kategori: 'Struktur', uraian: 'Pasangan Batu Kali / Pondasi', volume: 5, satuan: 'm3', harga: 650000 },
                { kategori: 'Struktur', uraian: 'Pekerjaan Beton Bertulang (Sloof/Kolom/Balok)', volume: 3, satuan: 'm3', harga: 2500000 },
                { kategori: 'Dinding', uraian: 'Pasangan Dinding Bata / Hebel', volume: 40, satuan: 'm2', harga: 120000 },
                { kategori: 'Dinding', uraian: 'Plesteran dan Acian Dinding', volume: 80, satuan: 'm2', harga: 55000 },
                { kategori: 'Kusen & Pintu', uraian: 'Pembuatan & Pemasangan Kusen, Pintu, Jendela', volume: 4, satuan: 'Unit', harga: 750000 },
                { kategori: 'Atap', uraian: 'Rangka Atap & Penutup Atap (Genteng/Spandek)', volume: 30, satuan: 'm2', harga: 200000 },
                { kategori: 'Plafon', uraian: 'Rangka Plafon & Gypsum', volume: 25, satuan: 'm2', harga: 90000 },
                { kategori: 'Lantai', uraian: 'Pemasangan Lantai Keramik', volume: 25, satuan: 'm2', harga: 140000 },
                { kategori: 'Finishing', uraian: 'Pengecatan Dinding & Plafon', volume: 105, satuan: 'm2', harga: 35000 }
            ];

            items12.forEach(i => {
                p.items.push({
                    id: 'item_' + Date.now() + Math.random(),
                    kategori: i.kategori,
                    uraian_pekerjaan: i.uraian,
                    volume: i.volume,
                    satuan: i.satuan,
                    harga_satuan: i.harga,
                    total_harga: i.volume * i.harga
                });
            });

            saveProyekList(list);
            loadItemRAB();
            loadProyek();
        }

        function tambahItemRAB(e) {
            e.preventDefault();
            if (!currentProyekId) return;

            const list = getProyekList();
            const p = list.find(item => item.id === currentProyekId);
            if (!p) return;

            const vol = parseFloat(document.getElementById('volume').value);
            const harga = parseFloat(document.getElementById('harga').value);

            const newItem = {
                id: 'item_' + Date.now(),
                kategori: document.getElementById('kategori').value,
                uraian_pekerjaan: document.getElementById('uraian').value,
                volume: vol,
                satuan: document.getElementById('satuan').value,
                harga_satuan: harga,
                total_harga: vol * harga
            };

            p.items.push(newItem);
            saveProyekList(list);
            loadItemRAB();
            loadProyek();
            e.target.reset();
        }

        function hapusItem(itemId) {
            if (!confirm('Yakin ingin menghapus item ini?')) return;

            const list = getProyekList();
            const p = list.find(item => item.id === currentProyekId);
            if (!p) return;

            p.items = p.items.filter(i => i.id !== itemId);
            saveProyekList(list);
            loadItemRAB();
            loadProyek();
        }

        loadProyek();
    </script>
</body>
</html>
